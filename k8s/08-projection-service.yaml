apiVersion: apps/v1
kind: Deployment
metadata:
  name: projection-service
  namespace: order-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: projection-service
  template:
    metadata:
      labels:
        app: projection-service
    spec:
      containers:
        - name: projection-service
          image: anshahh/projection-service:v1
          ports:
            - containerPort: 8003
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_NAME
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: RABBITMQ_URL
            - name: PORT
              value: "8003"
---
apiVersion: v1
kind: Service
metadata:
  name: projection-service
  namespace: order-system
spec:
  type: NodePort
  selector:
    app: projection-service
  ports:
    - port: 8003
      targetPort: 8003
      nodePort: 30003
