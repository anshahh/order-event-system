apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: order-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: anshahh/auth-service:v1
          ports:
            - containerPort: 8004
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_NAME
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: PORT
              value: "8004"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: order-system
spec:
  type: NodePort
  selector:
    app: auth-service
  ports:
    - port: 8004
      targetPort: 8004
      nodePort: 30004
